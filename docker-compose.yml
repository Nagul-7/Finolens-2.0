version: '3.9'

services:
  # ─────────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finolens_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: finolens_db
      POSTGRES_USER: finolens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finolens_dev}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U finolens -d finolens_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finolens_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD:-redis_dev}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Backend — Node.js / Express
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finolens_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgres://finolens:${POSTGRES_PASSWORD:-finolens_dev}@postgres:5432/finolens_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev}@redis:6379
      BROKER_MODE: paper
      KITE_API_KEY: ${KITE_API_KEY:-}
      KITE_API_SECRET: ${KITE_API_SECRET:-}
      SIGNAL_SERVICE_URL: http://signal-service:8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - '3001:3001'
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3001/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Signal Service — Python FastAPI
  # ─────────────────────────────────────────────
  signal-service:
    build:
      context: ./signal-service
      dockerfile: Dockerfile
    container_name: finolens_signals
    restart: unless-stopped
    environment:
      PORT: 8000
    ports:
      - '8000:8000'
    volumes:
      - ./signal-service:/app
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Frontend — React / Vite (dev mode)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finolens_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_SIGNAL_URL: http://localhost:8000
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
